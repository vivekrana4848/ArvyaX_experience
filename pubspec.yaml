name: arvyax_immersive_session
description: "ArvyaX Immersive Session App — Premium mindfulness & ambience player."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Audio
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.12

  # Database
  sqflite: ^2.3.2
  path: ^1.9.0

  # Navigation
  go_router: ^13.2.4

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Utils
  path_provider: ^2.1.2
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/audio/
    - assets/images/
